server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip static assets
    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── API reverse-proxy ─────────────────────────────────────────────────────
    # All /api/* calls are forwarded to the Laravel Nginx container.
    location /api/ {
        proxy_pass         http://backend-nginx:80/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All non-asset routes fall back to index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable assets (hashed filenames from Vite)
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
