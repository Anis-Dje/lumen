services:

  # ── Laravel PHP-FPM ─────────────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: "TechVault"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

      # Database (Supabase – remote, no local DB container needed)
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: ${DB_SSLMODE:-require}

      # Sessions & Cache (file-based – no Redis needed for MVP)
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      CACHE_STORE: file

      # Sanctum
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:80}

      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${APP_URL:-http://localhost}/api/auth/google/callback

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URL: ${APP_URL:-http://localhost}/api/auth/github/callback

      LOG_CHANNEL: stack
      LOG_LEVEL: error
      BCRYPT_ROUNDS: 12

    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Persist sessions and logs between restarts
      - app_storage:/var/www/html/storage
    networks:
      - lumen-net
    depends_on: []   # No local DB – Supabase is remote

  # ── Nginx (API gateway for the PHP-FPM app) ──────────────────────────────────
  backend-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Serve Laravel's public/ folder (static files, index.php entrypoint)
      - ./backend/public:/var/www/html/public:ro
    networks:
      - lumen-net
    depends_on:
      - app

  # ── React SPA (Nginx static server + /api reverse-proxy) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave blank → relative /api paths → proxied via Nginx (recommended)
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - lumen-net
    depends_on:
      - backend-nginx

volumes:
  app_storage:

networks:
  lumen-net:
    driver: bridge
